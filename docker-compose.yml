version: "3.8"

services:

  # FastAPI Backend
  api:
    build: .
    container_name: crag_hr_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data   # persist ChromaDB between restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  # Streamlit Frontend 
  streamlit:
    build: .
    container_name: crag_hr_streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
